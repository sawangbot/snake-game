<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Snake Game</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:#0a0a0f;color:#e0e0e0;
  font-family:system-ui,-apple-system,sans-serif;
  min-height:100vh;display:flex;justify-content:center;align-items:center;
  overflow:hidden;
}
.wrap{
  background:#111118;border-radius:24px;padding:24px;
  border:1px solid #1e1e2a;
  box-shadow:0 0 40px rgba(68,136,255,.08);
  position:relative;
}
.top{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;padding:0 4px}
.title{font-size:20px;font-weight:700;color:#4488ff;letter-spacing:.5px}
.stats{display:flex;gap:16px;font-size:14px;color:#888}
.stats>div{display:flex;align-items:center;gap:4px}
.stats strong{color:#eee;font-variant-numeric:tabular-nums}
.hi strong{color:#ffd700;transition:color .3s}
.hi strong.hi-new{color:#ff4466;animation:pulse .5s ease-in-out 3}
.tm strong{color:#66ccff}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.3)}}
canvas{
  display:block;width:400px;height:400px;border-radius:12px;
  background:#0d0d16;box-shadow:inset 0 0 30px rgba(0,0,0,.5);
  touch-action:none;
}
.btm{display:flex;justify-content:space-between;align-items:center;margin-top:14px}
.st{font-size:14px;color:#888}
.st.on{color:#4488ff}
.st.dead{color:#ff4466}
.st.paused{color:#ffaa00}
#rb{
  background:#1e1e2e;border:1px solid #2a2a3e;color:#ccc;
  padding:8px 20px;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;
  transition:all .2s;
}
#rb:hover{background:#4488ff;color:#0a0a0f;border-color:#4488ff;box-shadow:0 0 20px rgba(68,136,255,.25)}
/* Game Over overlay */
.gover{
  display:none;position:absolute;inset:0;border-radius:24px;
  background:rgba(0,0,0,.75);backdrop-filter:blur(6px);
  justify-content:center;align-items:center;flex-direction:column;gap:6px;
  z-index:10;
}
.gover.show{display:flex}
.gover .gtitle{font-size:28px;font-weight:800;color:#ff4466;text-shadow:0 0 30px rgba(255,68,102,.4)}
.gover .gscore{font-size:16px;color:#ccc;margin-top:4px}
.gover .gtimer{font-size:13px;color:#66ccff;margin-top:2px}
.gover .gbest{font-size:14px;color:#ffd700}
.gover .ghint{font-size:13px;color:#666;margin-top:8px}
.dpad{display:none;justify-content:center;margin-top:14px}
.dg{display:grid;grid-template-columns:52px 52px 52px;grid-template-rows:52px 52px 52px;gap:4px}
.db{
  background:#1a1a26;border:1px solid #2a2a3e;border-radius:12px;
  color:#aaa;font-size:20px;cursor:pointer;display:flex;
  align-items:center;justify-content:center;user-select:none;-webkit-user-select:none;
  touch-action:manipulation;
}
.db:active{background:#4488ff;color:#0a0a0f}
.du{grid-column:2;grid-row:1}
.dl{grid-column:1;grid-row:2}
.dr{grid-column:3;grid-row:2}
.dd{grid-column:2;grid-row:3}
@media(max-width:500px){
  .wrap{padding:16px;border-radius:16px}
  canvas{width:300px;height:300px}
  .dpad{display:flex}
  .top{flex-direction:column;gap:6px}
  .stats{gap:10px;font-size:13px}
}
@media(pointer:coarse){.dpad{display:flex}}
</style>
</head>
<body>
<div class="wrap" id="wrap">
  <div class="top">
    <div class="title">SNAKE</div>
    <div class="stats">
      <div class="sc">Score: <strong id="sc">0</strong></div>
      <div class="tm">&#9201; <strong id="tm">0:00</strong></div>
      <div class="hi">Best: <strong id="hi">0</strong></div>
    </div>
  </div>
  <canvas id="c" width="400" height="400"></canvas>
  <div class="gover" id="gover">
    <div class="gtitle">GAME OVER</div>
    <div class="gscore">Score: <strong id="gsc">0</strong></div>
    <div class="gtimer">Time: <strong id="gtm">0:00</strong></div>
    <div class="gbest" id="gbest"></div>
    <div class="ghint">Press <b>R</b> or tap Restart</div>
  </div>
  <div class="btm">
    <div class="st" id="st">arrows to move</div>
    <button id="rb">Restart</button>
  </div>
  <div class="dpad">
    <div class="dg">
      <button class="db du" data-d="up">▲</button>
      <button class="db dl" data-d="left">◀</button>
      <button class="db dr" data-d="right">▶</button>
      <button class="db dd" data-d="down">▼</button>
    </div>
  </div>
</div>
<script>
(function(){
  var c=document.getElementById('c'),ctx=c.getContext('2d');
  var scEl=document.getElementById('sc'),hiEl=document.getElementById('hi'),stEl=document.getElementById('st');
  var tmEl=document.getElementById('tm'),gtmEl=document.getElementById('gtm');
  var gover=document.getElementById('gover'),gscEl=document.getElementById('gsc'),gbestEl=document.getElementById('gbest');
  var G=20,SZ=400,CS=SZ/G;
  var snake,food,dir,nextDir,score,hi,loop,run,speed,paused;
  var startTime,pausedTime,timerInterval;

  hi=parseInt(localStorage.getItem('snakeHi'))||0;hiEl.textContent=hi;

  var keyMap={ArrowUp:'u',ArrowDown:'d',ArrowLeft:'l',ArrowRight:'r',w:'u',s:'d',a:'l',d:'r',W:'u',S:'d',A:'l',D:'r'};
  var opp={u:'d',d:'u',l:'r',r:'l'};
  var dv={u:{x:0,y:-1},d:{x:0,y:1},l:{x:-1,y:0},r:{x:1,y:0}};

  function rand(){return{x:Math.floor(Math.random()*G),y:Math.floor(Math.random()*G)}}

  function spawn(){
    var p;
    do{p=rand()}while(snake.some(function(s){return s.x===p.x&&s.y===p.y}));
    food=p;
  }

  function fmtTime(sec){
    var m=Math.floor(sec/60);
    var s=Math.floor(sec%60);
    return m+':'+(s<10?'0':'')+s;
  }

  function updateTimerDisplay(){
    if(!startTime)return;
    var now=paused&&pausedTime?pausedTime:Date.now();
    var elapsed=Math.floor((now-startTime)/1000);
    tmEl.textContent=fmtTime(elapsed);
  }

  function startTimer(){
    startTime=Date.now();
    pausedTime=null;
    if(timerInterval)clearInterval(timerInterval);
    timerInterval=setInterval(updateTimerDisplay,200);
    updateTimerDisplay();
  }

  function pauseTimer(){
    if(pausedTime)return;
    pausedTime=Date.now();
    if(timerInterval)clearInterval(timerInterval);
    timerInterval=null;
    updateTimerDisplay();
  }

  function resumeTimer(){
    if(!pausedTime)return;
    var pauseDur=Date.now()-pausedTime;
    startTime+=pauseDur;
    pausedTime=null;
    if(timerInterval)clearInterval(timerInterval);
    timerInterval=setInterval(updateTimerDisplay,200);
    updateTimerDisplay();
  }

  function stopTimer(){
    if(timerInterval)clearInterval(timerInterval);
    timerInterval=null;
    if(startTime){
      var elapsed=Math.floor(((pausedTime||Date.now())-startTime)/1000);
      gtmEl.textContent=fmtTime(elapsed);
    }
    startTime=null;
    pausedTime=null;
  }

  function drawGrid(){
    ctx.strokeStyle='#161622';ctx.lineWidth=.5;
    for(var i=0;i<=G;i++){
      ctx.beginPath();ctx.moveTo(i*CS,0);ctx.lineTo(i*CS,SZ);ctx.stroke();
      ctx.beginPath();ctx.moveTo(0,i*CS);ctx.lineTo(SZ,i*CS);ctx.stroke();
    }
  }

  function drawFood(){
    ctx.shadowColor='#ff4466';ctx.shadowBlur=15;
    ctx.fillStyle='#ff4466';
    ctx.beginPath();ctx.arc(food.x*CS+CS/2,food.y*CS+CS/2,CS/2-2,0,Math.PI*2);ctx.fill();
    ctx.shadowBlur=0;
  }

  function drawSnake(){
    for(var i=snake.length-1;i>=0;i--){
      var s=snake[i],cx=s.x*CS+CS/2,cy=s.y*CS+CS/2;
      var r=(i===0)?CS/2-1:CS/2-2;
      if(i===0){
        ctx.shadowColor='#4488ff';ctx.shadowBlur=10;
        var g=ctx.createRadialGradient(cx,cy,0,cx,cy,r);
        g.addColorStop(0,'#66aaff');g.addColorStop(1,'#2266cc');
        ctx.fillStyle=g;
      }else{
        ctx.shadowBlur=0;
        var t=i/snake.length;
        ctx.fillStyle='rgb(34,'+Math.floor(80-t*40)+','+Math.floor(200-t*80)+')';
      }
      ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.fill();
    }
    ctx.shadowBlur=0;
  }

  function drawEyes(){
    if(snake.length===0)return;
    var h=snake[0],cx=h.x*CS+CS/2,cy=h.y*CS+CS/2;
    var e1,e2;
    if(dir==='r'){e1={x:cx+5,y:cy-4};e2={x:cx+5,y:cy+4}}
    else if(dir==='l'){e1={x:cx-5,y:cy-4};e2={x:cx-5,y:cy+4}}
    else if(dir==='u'){e1={x:cx-4,y:cy-5};e2={x:cx+4,y:cy-5}}
    else{e1={x:cx-4,y:cy+5};e2={x:cx+4,y:cy+5}}
    ctx.fillStyle='#fff';
    ctx.beginPath();ctx.arc(e1.x,e1.y,3,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(e2.x,e2.y,3,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#111';
    ctx.beginPath();ctx.arc(e1.x+(dir==='r'?1:dir==='l'?-1:0),e1.y+(dir==='d'?1:dir==='u'?-1:0),1.5,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(e2.x+(dir==='r'?1:dir==='l'?-1:0),e2.y+(dir==='d'?1:dir==='u'?-1:0),1.5,0,Math.PI*2);ctx.fill();
  }

  function draw(){
    ctx.clearRect(0,0,SZ,SZ);
    drawGrid();
    drawFood();
    drawSnake();
    if(run)drawEyes();
  }

  function gameOver(){
    run=false;paused=false;clearInterval(loop);
    stopTimer();
    stEl.textContent='Game Over — '+score;stEl.className='st dead';
    var isNew=score>hi;
    if(isNew){
      hi=score;localStorage.setItem('snakeHi',hi);hiEl.textContent=hi;
      hiEl.className='hi-new';
      setTimeout(function(){hiEl.className='';},1500);
    }
    gscEl.textContent=score;
    gbestEl.textContent=isNew?'🏆 NEW HIGH SCORE!':'Best: '+hi;
    gover.className='gover show';
    draw();
  }

  function update(){
    dir=nextDir;var d=dv[dir];
    var head={x:snake[0].x+d.x,y:snake[0].y+d.y};
    if(head.x<0)head.x=G-1;if(head.x>=G)head.x=0;
    if(head.y<0)head.y=G-1;if(head.y>=G)head.y=0;
    for(var i=0;i<snake.length;i++){
      if(snake[i].x===head.x&&snake[i].y===head.y){
        gameOver();return;
      }
    }
    var ate=(head.x===food.x&&head.y===food.y);
    snake.unshift(head);
    if(ate){
      score++;scEl.textContent=score;
      if(score>hi){hi=score;localStorage.setItem('snakeHi',hi);hiEl.textContent=hi;}
      spawn();
      if(score%5===0&&speed>60){speed-=5;clearInterval(loop);loop=setInterval(tick,speed);}
    }else{snake.pop()}
    draw();
  }

  function tick(){if(run&&!paused)update()}

  function togglePause(){
    if(!run)return;
    paused=!paused;
    if(paused){
      pauseTimer();
      stEl.textContent='⏸ Paused';stEl.className='st paused';
    }else{
      resumeTimer();
      stEl.textContent='▶ Playing';stEl.className='st on';
    }
  }

  function changeDir(d){
    if(!run||paused)return;
    if(opp[d]===dir&&snake.length>1)return;
    nextDir=d;
    if(stEl.textContent.indexOf('to move')>=0||stEl.textContent.indexOf('Paused')>=0){
      stEl.textContent='▶ Playing';stEl.className='st on';
    }
  }

  function start(){
    if(loop)clearInterval(loop);
    stopTimer();
    snake=[{x:10,y:10},{x:9,y:10},{x:8,y:10}];
    dir='r';nextDir='r';score=0;speed=120;run=true;paused=false;
    scEl.textContent='0';tmEl.textContent='0:00';
    stEl.textContent='arrows to move';stEl.className='st';
    gover.className='gover';
    spawn();draw();
    startTimer();
    loop=setInterval(tick,speed);
  }

  document.addEventListener('keydown',function(e){
    if(keyMap[e.key]){e.preventDefault();changeDir(keyMap[e.key]);}
    if(e.key===' '||e.key==='Escape'){e.preventDefault();togglePause();}
    if((e.key==='r'||e.key==='R')&&!run){e.preventDefault();start();}
    if(e.key==='t'||e.key==='T'){/* reserved for potential time-mode toggle */}

  });

  var tx=0,ty=0;
  c.addEventListener('touchstart',function(e){
    tx=e.touches[0].clientX;ty=e.touches[0].clientY;
    if(!run){start();}
  },{passive:true});
  c.addEventListener('touchmove',function(e){e.preventDefault();},{passive:false});
  c.addEventListener('touchend',function(e){
    var dx=e.changedTouches[0].clientX-tx,dy=e.changedTouches[0].clientY-ty;
    if(Math.abs(dx)<15&&Math.abs(dy)<15)return;
    if(Math.abs(dx)>Math.abs(dy)){changeDir(dx>0?'r':'l')}else{changeDir(dy>0?'d':'u')}
  },{passive:true});

  document.querySelectorAll('.db').forEach(function(b){
    b.addEventListener('click',function(){changeDir(b.dataset.d)});
    b.addEventListener('touchstart',function(e){e.preventDefault();changeDir(b.dataset.d);},{passive:false});
  });

  document.getElementById('rb').addEventListener('click',start);
  gover.addEventListener('click',start);

  start();
})();
</script>
</body>
</html>
