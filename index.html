<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Snake Game</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0a0f;
      color: #e0e0e0;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    .game-wrapper {
      background: #111118;
      border-radius: 24px;
      padding: 28px;
      box-shadow:
        0 0 40px rgba(0, 255, 136, 0.06),
        inset 0 1px 0 rgba(255,255,255,0.03);
      border: 1px solid #1e1e2a;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 18px;
      padding: 0 4px;
    }

    .title {
      font-size: 20px;
      font-weight: 700;
      background: linear-gradient(135deg, #00ff88, #00cc6a);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: 0.5px;
    }

    .scores {
      display: flex;
      gap: 20px;
      font-size: 14px;
    }

    .scores span {
      color: #888;
    }

    .scores strong {
      color: #eee;
      font-variant-numeric: tabular-nums;
    }

    .scores .high-score strong {
      color: #ffd700;
    }

    canvas {
      display: block;
      width: 400px;
      height: 400px;
      border-radius: 12px;
      background: #0d0d16;
      box-shadow: inset 0 0 30px rgba(0,0,0,0.5);
      image-rendering: pixelated;
      touch-action: none;
    }

    .controls {
      margin-top: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .status {
      font-size: 14px;
      color: #666;
      transition: all 0.2s;
    }

    .status.playing { color: #00ff88; }
    .status.gameover { color: #ff4466; }

    #restartBtn {
      background: #1e1e2e;
      border: 1px solid #2a2a3e;
      color: #ccc;
      padding: 8px 20px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    #restartBtn:hover {
      background: #00ff88;
      color: #0a0a0f;
      border-color: #00ff88;
      box-shadow: 0 0 20px rgba(0,255,136,0.2);
    }

    .dpad {
      display: none;
      margin-top: 16px;
      justify-content: center;
    }

    .dpad-grid {
      display: grid;
      grid-template-columns: 56px 56px 56px;
      grid-template-rows: 56px 56px 56px;
      gap: 4px;
    }

    .dpad-btn {
      background: #1a1a26;
      border: 1px solid #2a2a3e;
      border-radius: 12px;
      color: #aaa;
      font-size: 22px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.1s;
      user-select: none;
      -webkit-user-select: none;
      touch-action: manipulation;
    }

    .dpad-btn:active { background: #00ff88; color: #0a0a0f; }
    .dpad-up    { grid-column: 2; grid-row: 1; }
    .dpad-left  { grid-column: 1; grid-row: 2; }
    .dpad-right { grid-column: 3; grid-row: 2; }
    .dpad-down  { grid-column: 2; grid-row: 3; }

    @media (max-width: 480px) {
      .game-wrapper { padding: 16px; border-radius: 16px; }
      canvas { width: 300px; height: 300px; }
      .header { flex-direction: column; gap: 8px; }
      .dpad { display: flex; }
    }

    @media (max-width: 350px) {
      canvas { width: 240px; height: 240px; }
      .dpad-grid { grid-template-columns: 48px 48px 48px; grid-template-rows: 48px 48px 48px; }
      .dpad-btn { font-size: 18px; }
    }

    @media (pointer: coarse) {
      .dpad { display: flex; }
    }
  </style>
</head>
<body>
<div class="game-wrapper">
  <div class="header">
    <div class="title">🐍 SNAKE</div>
    <div class="scores">
      <div class="score">Score: <strong id="score">0</strong></div>
      <div class="high-score">Best: <strong id="highScore">0</strong></div>
    </div>
  </div>

  <canvas id="gameCanvas" width="400" height="400"></canvas>

  <div class="controls">
    <div class="status" id="status">← ↑ → ↓  to start</div>
    <button id="restartBtn">↻ Restart</button>
  </div>

  <div class="dpad" id="dpad">
    <div class="dpad-grid">
      <button class="dpad-btn dpad-up"    data-dir="up">   ↑ </button>
      <button class="dpad-btn dpad-left"  data-dir="left"> ← </button>
      <button class="dpad-btn dpad-right" data-dir="right">→ </button>
      <button class="dpad-btn dpad-down"  data-dir="down"> ↓ </button>
    </div>
  </div>
</div>

<script>
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');
  const scoreEl = document.getElementById('score');
  const highScoreEl = document.getElementById('highScore');
  const statusEl = document.getElementById('status');

  const GRID = 20;
  const SIZE = 400;
  const CELL = SIZE / GRID;

  let snake, food, direction, nextDirection, score, highScore;
  let gameLoop, gameRunning, gameOver;
  let speed;

  const DIR = { UP: { x: 0, y: -1 }, DOWN: { x: 0, y: 1 }, LEFT: { x: -1, y: 0 }, RIGHT: { x: 1, y: 0 } };
  const OPPOSITE = { up: 'down', down: 'up', left: 'right', right: 'left' };

  highScore = parseInt(localStorage.getItem('snakeHighScore')) || 0;
  highScoreEl.textContent = highScore;

  function randPos() {
    return {
      x: Math.floor(Math.random() * GRID),
      y: Math.floor(Math.random() * GRID)
    };
  }

  function spawnFood() {
    let pos;
    do {
      pos = randPos();
    } while (snake.some(s => s.x === pos.x && s.y === pos.y));
    food = pos;
  }

  function init() {
    snake = [
      { x: 10, y: 10 },
      { x: 9, y: 10 },
      { x: 8, y: 10 }
    ];
    direction = 'right';
    nextDirection = 'right';
    score = 0;
    speed = 120;
    gameOver = false;
    gameRunning = true;
    scoreEl.textContent = '0';
    statusEl.textContent = '↑ ← ↓ →  to move';
    statusEl.className = 'status playing';
    spawnFood();
    draw();
  }

  function draw() {
    ctx.clearRect(0, 0, SIZE, SIZE);

    // Grid lines (subtle)
    ctx.strokeStyle = '#161622';
    ctx.lineWidth = 0.5;
    for (let i = 0; i <= GRID; i++) {
      ctx.beginPath();
      ctx.moveTo(i * CELL, 0);
      ctx.lineTo(i * CELL, SIZE);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(0, i * CELL);
      ctx.lineTo(SIZE, i * CELL);
      ctx.stroke();
    }

    // Food (glowing)
    const fx = food.x * CELL + CELL / 2;
    const fy = food.y * CELL + CELL / 2;
    const gradient = ctx.createRadialGradient(fx, fy, 0, fx, fy, CELL);
    gradient.addColorStop(0, '#ff4466');
    gradient.addColorStop(0.6, '#cc2255');
    gradient.addColorStop(1, '#881133');
    ctx.shadowColor = '#ff4466';
    ctx.shadowBlur = 15;
    ctx.beginPath();
    ctx.arc(fx, fy, CELL / 2 - 2, 0, Math.PI * 2);
    ctx.fillStyle = gradient;
    ctx.fill();
    ctx.shadowBlur = 0;

    // Snake body
    for (let i = snake.length - 1; i >= 0; i--) {
      const s = snake[i];
      const pad = i === 0 ? 1 : 2;
      const x = s.x * CELL + pad;
      const y = s.y * CELL + pad;
      const w = CELL - pad * 2;
      const r = i === 0 ? 6 : 4;

      if (i === 0) {
        // Head - gradient green
        const g = ctx.createRadialGradient(
          x + w / 2, y + w / 2, 0,
          x + w / 2, y + w / 2, w
        );
        g.addColorStop(0, '#00ff88');
        g.addColorStop(1, '#00aa55');
        ctx.shadowColor = '#00ff88';
        ctx.shadowBlur = 12;
        ctx.fillStyle = g;
      } else {
        // Body - fades darker
        const t = i / snake.length;
        const green = Math.floor(120 - t * 60);
        ctx.shadowBlur = 0;
        ctx.fillStyle = `rgb(0, ${green}, 50)`;
      }

      ctx.beginPath();
      ctx.roundRect(x, y, w, w, r);
      ctx.fill();
    }
    ctx.shadowBlur = 0;

    // Eyes on head
    if (snake.length > 0 && !gameOver) {
      const head = snake[0];
      const cx = head.x * CELL + CELL / 2;
      const cy = head.y * CELL + CELL / 2;
      let e1, e2;
      const o = 4;
      if (direction === 'right') {
        e1 = { x: cx + 5, y: cy - 4 }; e2 = { x: cx + 5, y: cy + 4 };
      } else if (direction === 'left') {
        e1 = { x: cx - 5, y: cy - 4 }; e2 = { x: cx - 5, y: cy + 4 };
      } else if (direction === 'up') {
        e1 = { x: cx - 4, y: cy - 5 }; e2 = { x: cx + 4, y: cy - 5 };
      } else {
        e1 = { x: cx - 4, y: cy + 5 }; e2 = { x: cx + 4, y: cy + 5 };
      }
      ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.arc(e1.x, e1.y, 2.5, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(e2.x, e2.y, 2.5, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#111';
      ctx.beginPath(); ctx.arc(e1.x + 1, e1.y, 1, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(e2.x + 1, e2.y, 1, 0, Math.PI * 2); ctx.fill();
    }
  }

  function update() {
    direction = nextDirection;
    const d = DIR[direction.toUpperCase()];
    const head = { x: snake[0].x + d.x, y: snake[0].y + d.y };

    // Wall wrap
    if (head.x < 0) head.x = GRID - 1;
    if (head.x >= GRID) head.x = 0;
    if (head.y < 0) head.y = GRID - 1;
    if (head.y >= GRID) head.y = 0;

    // Self collision
    if (snake.some(s => s.x === head.x && s.y === head.y)) {
      gameOver = true;
      gameRunning = false;
      clearInterval(gameLoop);
      statusEl.textContent = `💀 Game Over — Score: ${score}`;
      statusEl.className = 'status gameover';
      draw();
      if (score > highScore) {
        highScore = score;
        localStorage.setItem('snakeHighScore', highScore);
        highScoreEl.textContent = highScore;
      }
      return;
    }

    snake.unshift(head);

    if (head.x === food.x && head.y === food.y) {
      score++;
      scoreEl.textContent = score;
      if (score > highScore) {
        highScore = score;
        localStorage.setItem('snakeHighScore', highScore);
        highScoreEl.textContent = highScore;
      }
      spawnFood();
      // Speed up slightly every 5 food
      if (score % 5 === 0 && speed > 60) {
        speed -= 5;
        clearInterval(gameLoop);
        gameLoop = setInterval(tick, speed);
      }
    } else {
      snake.pop();
    }

    draw();
  }

  function tick() {
    if (gameRunning) update();
  }

  function changeDir(newDir) {
    if (!gameRunning) return;
    if (OPPOSITE[newDir] === direction && snake.length > 1) return;
    nextDirection = newDir;
    if (statusEl.textContent.includes('to start')) {
      statusEl.textContent = '▶ Playing';
      statusEl.className = 'status playing';
    }
  }

  function startGame() {
    if (gameLoop) clearInterval(gameLoop);
    init();
    gameLoop = setInterval(tick, speed);
  }

  // Keyboard
  document.addEventListener('keydown', (e) => {
    const map = {
      ArrowUp: 'up', ArrowDown: 'down', ArrowLeft: 'left', ArrowRight: 'right',
      w: 'up', s: 'down', a: 'left', d: 'right',
      W: 'up', S: 'down', A: 'left', D: 'right'
    };
    if (map[e.key]) {
      e.preventDefault();
      changeDir(map[e.key]);
    }
  });

  // Touch swipe
  let touchStartX = 0, touchStartY = 0;
  canvas.addEventListener('touchstart', (e) => {
    const t = e.touches[0];
    touchStartX = t.clientX;
    touchStartY = t.clientY;
  }, { passive: true });

  canvas.addEventListener('touchmove', (e) => e.preventDefault(), { passive: false });

  canvas.addEventListener('touchend', (e) => {
    const rect = canvas.getBoundingClientRect();
    const fakeTouch = {
      clientX: touchStartX + (e.changedTouches[0].clientX - touchStartX) * 0.5,
      clientY: touchStartY + (e.changedTouches[0].clientY - touchStartY) * 0.5
    };
    const dx = fakeTouch.clientX - touchStartX;
    const dy = fakeTouch.clientY - touchStartY;
    if (Math.abs(dx) < 15 && Math.abs(dy) < 15) return;
    if (Math.abs(dx) > Math.abs(dy)) {
      changeDir(dx > 0 ? 'right' : 'left');
    } else {
      changeDir(dy > 0 ? 'down' : 'up');
    }
  }, { passive: true });

  // D-pad buttons
  document.querySelectorAll('.dpad-btn').forEach(btn => {
    btn.addEventListener('click', () => changeDir(btn.dataset.dir));
    btn.addEventListener('touchstart', (e) => {
      e.preventDefault();
      changeDir(btn.dataset.dir);
    }, { passive: false });
  });

  // Restart
  document.getElementById('restartBtn').addEventListener('click', startGame);

  // roundRect polyfill for older browsers
  if (!CanvasRenderingContext2D.prototype.roundRect) {
    CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
      if (typeof r === 'number') r = [r];
      const tl = r[0] || 0, tr = r[1] || r[0] || 0,
            br = r[2] || r[0] || 0, bl = r[3] || r[1] || r[0] || 0;
      this.moveTo(x + tl, y);
      this.lineTo(x + w - tr, y);
      this.quadraticCurveTo(x + w, y, x + w, y + tr);
      this.lineTo(x + w, y + h - br);
      this.quadraticCurveTo(x + w, y + h, x + w - br, y + h);
      this.lineTo(x + bl, y + h);
      this.quadraticCurveTo(x, y + h, x, y + h - bl);
      this.lineTo(x, y + tl);
      this.quadraticCurveTo(x, y, x + tl, y);
      this.closePath();
      return this;
    };
  }

  startGame();
</script>
</body>
</html>
